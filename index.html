<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساحتنا الخاصة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0f1e] text-white">

    <div class="max-w-md mx-auto min-h-screen flex flex-col p-6">
        
        <header class="text-center my-10">
            <div class="heart-pulse bg-gradient-to-br from-pink-500 to-purple-600 mx-auto w-32 h-32 rounded-full flex flex-col justify-center items-center shadow-lg">
                <span id="days-count" class="text-4xl font-bold">0</span>
                <p class="text-[10px] uppercase">Days</p>
            </div>
            <h1 class="mt-4 text-lg font-bold text-pink-200">مساحتنا الآمنة ❤️</h1>
        </header>

        <section class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="sendVibe('🫂')" class="glass p-5 rounded-[25px] flex flex-col items-center active:scale-90 transition">
                <span class="text-2xl">🫂</span>
                <span class="text-[10px] mt-2 text-gray-300">أرسل حضناً</span>
            </button>
            <button onclick="window.location.href='vault.html'" class="glass p-5 rounded-[25px] flex flex-col items-center active:scale-90 transition border border-pink-500/30">
                <span class="text-2xl">🔒</span>
                <span class="text-[10px] mt-2 text-pink-400 font-bold">الخزنة السرية</span>
            </button>
        </section>

        <section class="glass flex-1 rounded-[30px] p-4 flex flex-col mb-24 overflow-hidden">
            <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 p-2 text-sm">
                <div class="bg-white/5 p-3 rounded-2xl rounded-tr-none ml-auto max-w-[80%]">مرحباً بكما في عالمكما الصغير.. ✨</div>
            </div>
            <div class="flex gap-2 mt-2">
                <input id="msg-input" type="text" placeholder="اكتب شيئاً..." class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-2 text-xs focus:outline-none focus:border-pink-500">
                <button onclick="handleSend()" class="bg-pink-600 p-2 rounded-full">🏹</button>
            </div>
        </section>

        <footer class="fixed bottom-6 left-6 right-6 max-w-md mx-auto">
            <div class="glass p-3 rounded-full flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-pink-500 rounded-full animate-spin-slow flex items-center justify-center text-[10px]">🎵</div>
                    <p class="text-[10px] text-pink-100 italic">Perfect - Ed Sheeran</p>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
